services:
  # FastAPI Web Server
  - type: web
    name: cortex-backend
    env: python
    buildCommand: "./scripts/render-build.sh"
    startCommand: "export PATH=\"$HOME/.cargo/bin:$PATH\" && cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: FAST_MODEL_BASE_URL
        sync: false
      - key: EMBEDDING_MODEL_ENDPOINT
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # RQ Background Worker for Data Ingestion
  - type: worker
    name: cortex-worker
    env: python
    buildCommand: "./scripts/render-build.sh"
    startCommand: "export PATH=\"$HOME/.cargo/bin:$PATH\" && cd backend && uv run python -m ingestion_worker.main"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: FAST_MODEL_BASE_URL
        sync: false
      - key: EMBEDDING_MODEL_ENDPOINT
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
